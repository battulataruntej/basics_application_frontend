version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edutech-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-development-secret-key}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./edutech.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    networks:
      - edutech-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edutech-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - edutech-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: edutech-postgres
    environment:
      - POSTGRES_DB=edutech
      - POSTGRES_USER=edutech
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-edutech123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - edutech-network
    restart: unless-stopped

  # Redis for session management
  redis:
    image: redis:7-alpine
    container_name: edutech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - edutech-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  edutech-network:
    driver: bridge